<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Memories 💜</title>

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:'Segoe UI',sans-serif;
text-align:center;
color:white;
min-height:100vh;

background:linear-gradient(-45deg,#020024,#090979,#4b0082,#7b2cbf,#1e3c72);
background-size:400% 400%;
animation:gradientMove 12s ease infinite;

overflow-x:hidden;
}

@keyframes gradientMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

h1{
margin-top:30px;
font-size:clamp(28px,7vw,48px);
text-shadow:0 0 10px #9d4edd;
}

/* gallery */

.gallery{

display:grid;
grid-template-columns:repeat(4,1fr);
gap:18px;

width:90%;
max-width:950px;

margin:40px auto;

animation:fadeGallery 2s ease;

}

@keyframes fadeGallery{
from{opacity:0; transform:translateY(40px);}
to{opacity:1; transform:translateY(0);}
}

.photo{

position:relative;
cursor:pointer;
overflow:hidden;
border-radius:12px;

}

.photo img{

width:100%;
height:200px;
object-fit:cover;

border-radius:12px;

box-shadow:0 0 10px rgba(150,100,255,0.6);

transition:0.3s;

}

.photo img:hover{
transform:scale(1.05);
}

/* mobile */

@media(max-width:600px){

.gallery{
grid-template-columns:repeat(2,1fr);
}

.photo img{
height:160px;
}

}

/* zoom popup */

.viewer{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background:rgba(0,0,0,0.9);

display:none;
justify-content:center;
align-items:center;

z-index:999;

}

.viewer img{

max-width:90%;
max-height:90%;

border-radius:15px;

}

/* close */

.close{

position:absolute;
top:30px;
right:40px;

font-size:35px;
cursor:pointer;

}

/* falling stars */

.star{

position:fixed;
top:-10px;

width:2px;
height:80px;

background:linear-gradient(white, transparent);

transform:rotate(45deg);

animation:fallStar linear forwards;

}

@keyframes fallStar{

0%{transform:translateY(-100px) translateX(0) rotate(45deg)}

100%{transform:translateY(110vh) translateX(-200px) rotate(45deg)}

}

/* button */

button{

margin:30px;

padding:14px 30px;

font-size:18px;

border:none;
border-radius:30px;

cursor:pointer;

background:linear-gradient(45deg,#4ea8de,#9d4edd);

color:white;

box-shadow:0 0 12px rgba(150,100,255,0.6);

}

</style>

</head>

<body>

<h1>Our Memories 💜</h1>

<div class="gallery">

<div class="photo"><img src="Memories/01.jpeg"></div>
<div class="photo"><img src="Memories/02.jpeg"></div>
<div class="photo"><img src="Memories/03.jpeg"></div>
<div class="photo"><img src="Memories/04.jpeg"></div>

<div class="photo"><img src="Memories/05.jpeg"></div>
<div class="photo"><img src="Memories/06.jpeg"></div>
<div class="photo"><img src="Memories/07.jpeg"></div>
<div class="photo"><img src="Memories/08.jpeg"></div>

<div class="photo"><img src="Memories/09.jpeg"></div>
<div class="photo"><img src="Memories/10.jpeg"></div>
<div class="photo"><img src="Memories/11.jpeg"></div>
<div class="photo"><img src="Memories/12.jpeg"></div>

<div class="photo"><img src="Memories/13.jpeg"></div>
<div class="photo"><img src="Memories/14.jpeg"></div>
<div class="photo"><img src="Memories/15.jpeg"></div>
<div class="photo"><img src="Memories/16.jpeg"></div>

</div>

<button onclick="nextPage()">
Next ❤️
</button>

<!-- viewer -->

<div class="viewer" id="viewer">

<span class="close" onclick="closeViewer()">✖</span>

<img id="viewerImg">

</div>

<script>

/* zoom viewer */

const photos=document.querySelectorAll(".photo img")

photos.forEach(img=>{

img.onclick=()=>{

document.getElementById("viewer").style.display="flex"

document.getElementById("viewerImg").src=img.src

}

})

function closeViewer(){

document.getElementById("viewer").style.display="none"

}

/* falling stars */

function createStar(){

const star=document.createElement("div")

star.className="star"

star.style.left=Math.random()*100+"vw"

star.style.animationDuration=(Math.random()*3+2)+"s"

document.body.appendChild(star)

setTimeout(()=>star.remove(),5000)

}

setInterval(createStar,700)

/* next */

function nextPage(){

window.location.href="final.html"

}

</script>

</body>

</html>
