<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forever 💜</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{

height:100vh;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

font-family:'Segoe UI',sans-serif;

text-align:center;
color:white;

background:linear-gradient(135deg,#020024,#090979,#4b0082,#7b2cbf);

overflow:hidden;

}

/* title */

h1{

font-size:clamp(30px,7vw,48px);

margin-bottom:20px;

text-shadow:0 0 10px #9d4edd;

}

/* typing text */

#typing{

font-size:clamp(16px,4vw,22px);

max-width:90%;

line-height:1.7;

margin-bottom:25px;

}

/* button */

button{

padding:14px 30px;

font-size:18px;

border:none;
border-radius:30px;

cursor:pointer;

background:linear-gradient(45deg,#4ea8de,#9d4edd);

color:white;

box-shadow:0 0 12px rgba(150,100,255,0.6);

}

/* popup */

.popup{

position:fixed;

top:50%;
left:50%;

transform:translate(-50%,-50%);

background:#111;

padding:25px 30px;

border-radius:15px;

font-size:18px;

display:none;

box-shadow:0 0 20px #9d4edd;

}

/* hearts */

.heart{

position:absolute;

font-size:26px;

animation:explode 1.5s ease forwards;

}

@keyframes explode{

0%{
transform:translate(0,0) scale(1);
opacity:1;
}

100%{
transform:translate(var(--x),var(--y)) scale(1.4);
opacity:0;
}

}

/* stars */

.star{

position:fixed;

top:-10px;

width:2px;
height:80px;

background:linear-gradient(white,transparent);

transform:rotate(45deg);

animation:fallStar linear forwards;

}

@keyframes fallStar{

0%{transform:translateY(-100px) translateX(0) rotate(45deg)}

100%{transform:translateY(110vh) translateX(-200px) rotate(45deg)}

}

/* fade screen */

.fade{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:black;

opacity:0;

pointer-events:none;

transition:3s;

}

</style>

</head>

<body>

<audio id="bgMusic" loop>
<source src="love.mp3" type="audio/mpeg">
</audio>

<h1>Thank You 💜</h1>

<p id="typing"></p>

<button onclick="foreverClick()">
Forever ❤️
</button>

<div class="popup" id="popupMessage">

This message will be erased in 3 hours…<br><br>

But before it disappears I want to say something.<br><br>

You are one of the most beautiful parts of my life 💜

</div>

<div class="fade" id="fadeScreen"></div>

<script>

/* mobile safe music */

const music=document.getElementById("bgMusic")

music.volume=0.5

document.body.addEventListener("click",()=>{
music.play().catch(()=>{})
},{once:true})

/* typing message */

const text="Maybe this message will disappear... but my care for you will never disappear ❤️"

let i=0

function typeText(){

if(i < text.length){

document.getElementById("typing").innerHTML += text.charAt(i)

i++

setTimeout(typeText,50)

}

}

typeText()

/* forever button */

function foreverClick(){

loveExplosion()

const popup=document.getElementById("popupMessage")

popup.style.display="block"

/* fade ending */

setTimeout(()=>{

document.getElementById("fadeScreen").style.opacity="1"

music.volume=0

},5000)

}

/* hearts explosion */

function loveExplosion(){

for(let i=0;i<35;i++){

const heart=document.createElement("div")

heart.innerHTML="💖"

heart.className="heart"

heart.style.left="50%"
heart.style.top="50%"

heart.style.setProperty("--x",(Math.random()*600-300)+"px")
heart.style.setProperty("--y",(Math.random()*600-300)+"px")

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),1500)

}

}

/* falling stars */

function createStar(){

const star=document.createElement("div")

star.className="star"

star.style.left=Math.random()*100+"vw"

star.style.animationDuration=(Math.random()*3+2)+"s"

document.body.appendChild(star)

setTimeout(()=>star.remove(),5000)

}

setInterval(createStar,700)

</script>

</body>

</html>
