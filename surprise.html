<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday 💜</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;

font-family:'Segoe UI',sans-serif;
text-align:center;
color:white;

background:linear-gradient(-45deg,#020024,#090979,#4b0082,#7b2cbf);
background-size:400% 400%;
animation:gradientMove 12s ease infinite;
}

@keyframes gradientMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* title */

h1{
font-size:clamp(30px,7vw,48px);
margin-bottom:10px;
text-shadow:0 0 10px #4ea8de,0 0 20px #7b2cbf;
}

/* nickname */

#nickname{
font-size:clamp(20px,5vw,28px);
margin-bottom:20px;
color:#e6dcff;
}

/* message */

.message{
max-width:90%;
line-height:1.6;
font-size:clamp(16px,4vw,18px);
margin-bottom:20px;
}

/* button */

button{
padding:14px 30px;
font-size:18px;
border:none;
border-radius:30px;
cursor:pointer;

background:linear-gradient(45deg,#4ea8de,#9d4edd);
color:white;

box-shadow:0 0 15px rgba(150,100,255,0.6);
}

/* hearts */

.heart{
position:fixed;
font-size:22px;
animation:float 12s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);opacity:0;}
50%{opacity:1;}
100%{transform:translateY(-10vh);opacity:0;}
}

/* stars */

.star{
position:fixed;
top:-10px;
width:2px;
height:80px;
background:linear-gradient(white,transparent);
transform:rotate(45deg);
animation:fallStar linear forwards;
}

@keyframes fallStar{
0%{transform:translateY(-100px) translateX(0) rotate(45deg);}
100%{transform:translateY(110vh) translateX(-200px) rotate(45deg);}
}

/* video popup */

.video-popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background:rgba(0,0,0,0.9);

display:flex;
justify-content:center;
align-items:center;

z-index:999;
}

.video-container{
position:relative;
width:90%;
max-width:700px;
}

video{
width:100%;
border-radius:15px;
}

.close-btn{
position:absolute;
top:-35px;
right:0;
font-size:30px;
cursor:pointer;
}

</style>

</head>

<body>

<audio id="bgMusic" loop>
<source src="love.mp3" type="audio/mpeg">
</audio>

<!-- floating hearts -->

<div class="heart" style="left:10%">💜</div>
<div class="heart" style="left:40%;animation-delay:3s">💙</div>
<div class="heart" style="left:70%;animation-delay:5s">💜</div>

<h1>Happy Birthday ❤️</h1>

<div id="nickname"></div>

<div class="message">

Happy Birthday da en azhagana ponnu 💜

<br><br>

Nee en life ku vandha apram dhan ellame romba azhaga maari pochu.

<br><br>

Nee en happiness, en peace, en favourite person ❤️

</div>

<button onclick="openMemories()">
Open Our Memories 📸
</button>

<!-- VIDEO POPUP -->

<div class="video-popup" id="videoPopup">

<div class="video-container">

<span class="close-btn" onclick="closeVideo()">✖</span>

<video id="wishVideo" autoplay controls>
<source src="wish.mp4" type="video/mp4">
</video>

</div>

</div>

<script>

/* background music */

const music=document.getElementById("bgMusic")
music.volume=0.5

document.body.addEventListener("click",()=>{
music.play().catch(()=>{})
},{once:true})

/* nickname animation */

const names=[
"En Princess 👑",
"En Cutie 💜",
"En Angel ✨",
"En Baby 🥰",
"En Everything ❤️"
]

let index=0

function showName(){

document.getElementById("nickname").textContent=names[index]

index++

if(index<names.length){

setTimeout(showName,1800)

}

}

showName()

/* close video */

function closeVideo(){

const video=document.getElementById("wishVideo")

video.pause()
video.currentTime=0

document.getElementById("videoPopup").style.display="none"

heartExplosion()

}

/* heart explosion */

function heartExplosion(){

for(let i=0;i<40;i++){

let heart=document.createElement("div")

heart.innerHTML="💖"

heart.style.position="fixed"
heart.style.left=Math.random()*100+"vw"
heart.style.top=Math.random()*100+"vh"
heart.style.fontSize="22px"
heart.style.animation="float 4s linear"

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),4000)

}

}

/* falling stars */

function createStar(){

const star=document.createElement("div")

star.className="star"

star.style.left=Math.random()*100+"vw"

star.style.animationDuration=(Math.random()*3+2)+"s"

document.body.appendChild(star)

setTimeout(()=>star.remove(),5000)

}

setInterval(createStar,700)

/* next page */

function openMemories(){

window.location.href="memories.html"

}

</script>

</body>
</html>
